services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sentiment-backend
    restart: unless-stopped
    environment:
      PYTHONPATH: /app/backend:/app/opentdx
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
    ports:
      - "8000:8000"
