services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sentiment-backend
    restart: unless-stopped
    environment:
      PYTHONPATH: /app/backend:/app/opentdx
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: sentiment-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
