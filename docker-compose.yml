services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: sentiment-api
    restart: unless-stopped
    environment:
      PYTHONPATH: /app/apps/api
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
    ports:
      - "8000:8000"
