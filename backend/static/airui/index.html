        return tables.map((table) => `
          <article class="card panel">
            <div class="panel-head">
              <h3>${escapeHtml(table.title)}</h3>
              <span class="tag">${escapeHtml(table.kind || "Table")} · ${table.rows.length}</span>
            </div>
            ${renderStructuredTable(table)}
          </article>
        `).join("");
      }

      function renderStructuredTable(table) {
        const headers = table.headers || [];
        const rows = table.rows || [];
        if (!headers.length || !rows.length) return `<div class="note">暂无表格数据</div>`;
        return `
          <div class="table-wrap" style="max-height:none">
            <table>
              <thead><tr>${headers.map((h) => `<th>${escapeHtml(h)}</th>`).join("")}</tr></thead>
              <tbody>${rows.map((row) => `<tr>${headers.map((_, i) => `<td>${markdownToHtml(row[i] || "", { inlineOnly: true })}</td>`).join("")}</tr>`).join("")}</tbody>
            </table>
          </div>
        `;
      }

      function renderAirDocExtra() {
        if (!state.airDoc?.root) return "";
        const known = new Set(["gauge-sentiment", "kpi-limitUp", "kpi-broken", "kpi-limitDown", "kpi-sealRate", "kpi-bombRate", "kpi-yesterdayPremium", "chart-trend", "table-plates", "chart-methods", "table-risks", "table-watchlist", "table-indexes"]);
        const widgets = [];
        collectWidgets(state.airDoc.root, widgets);
        const extra = widgets.filter((w) => !known.has(w.ref));
        if (!extra.length) return "";
        return `
          <article class="card panel">
            <div class="panel-head"><h3>AIRUI 动态面板</h3><span class="tag">${extra.length}</span></div>
            <div class="grid">
              ${extra.map((w) => `<section class="card panel"><div class="card-title">${escapeHtml(w.props?.title || w.ref || "面板")}</div>${renderAirComponent((w.children || [])[0])}</section>`).join("")}
            </div>
          </article>
        `;
      }

      function collectWidgets(node, out) {
        if (!node) return;
        if (node.type === "Widget") out.push(node);
        (node.children || []).forEach((child) => collectWidgets(child, out));
      }

      function renderAirComponent(node) {
        if (!node) return "";
        const props = node.props || {};
        if (node.type === "KPI") return `<div class="big-number">${escapeHtml(props.value)}<small>${escapeHtml(props.suffix || "")}</small></div>`;
        if (node.type === "Gauge") return `<div class="gauge" style="--gauge:${clamp(n(props.value), 0, 100)}%"><b>${Math.round(n(props.value))}</b></div>`;
        if (node.type === "Chart") return props.chartType === "bar" ? renderSimpleBar(props.data || {}) : renderAirLine(props.data || {});
        if (node.type === "Table") return renderAirTable(props);
        if (node.type === "Text" || node.type === "Markdown") return `<div class="markdown-body">${markdownToHtml(props.text || props.content || "")}</div>`;
        return `<pre class="note">${escapeHtml(JSON.stringify(node, null, 2))}</pre>`;
      }

      function renderAirTable(props) {
        const cols = props.columns || [];
        const rows = props.rows || [];
        if (!cols.length) return `<div class="note">暂无表格数据</div>`;
        return `<div class="table-wrap"><table><thead><tr>${cols.map((c) => `<th>${escapeHtml(c.label || c.key)}</th>`).join("")}</tr></thead><tbody>${rows.map((r) => `<tr>${cols.map((c) => `<td>${escapeHtml(r[c.key])}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`;
      }

      function renderAirLine(data) {
        const points = (data.series || [])[0]?.values || [];
        return `<div class="note">${escapeHtml((data.series || []).map((s) => s.name).join(" / ") || "趋势图")}：${points.slice(-6).map((v) => fmtLoose(v, 1)).join(" · ")}</div>`;
      }

      function renderSimpleBar(data) {
        const labels = data.labels || [];
        const values = (data.values || []).map(n);
        const max = Math.max(1, ...values);
        return `<div class="grid">${labels.map((label, i) => `<div><div class="scale-labels"><span>${escapeHtml(label)}</span><span>${fmtLoose(values[i], 1)}</span></div><div class="progress"><span style="width:${values[i] / max * 100}%"></span></div></div>`).join("")}</div>`;
      }

      function renderSettings() {
        const cfg = state.config || {};
        const model = cfg.model || {};
        const runtime = cfg.runtime || {};
        const skillsCfg = cfg.skills || {};
        const mcp = cfg.mcp || {};
        return `
          <section class="page-head">
            <div><div class="eyebrow">配置写入 backend/config/agent.json</div><h2>设置</h2></div>
            <div class="meta-card"><span>LLM</span><b>${escapeHtml(model.name || "--")}</b></div>
          </section>

          <section class="grid settings-grid">
            <aside class="settings-nav">
              <article class="card panel">
                <div class="panel-head"><h3>主题</h3></div>
                <div class="segmented" style="display:flex;flex-wrap:wrap">
                  ${["auto", "light", "dark", "graphite"].map((theme) => `<button type="button" data-theme-choice="${theme}" class="${(localStorage.getItem("sentiment-theme") || "auto") === theme ? "active" : ""}">${theme === "auto" ? "自动" : theme === "light" ? "浅色" : theme === "dark" ? "深色" : "石墨"}</button>`).join("")}
                </div>
              </article>
              <article class="card panel">
                <div class="panel-head"><h3>启用 Skills</h3><span class="tag">${state.enabledSkills.length}</span></div>
                <div class="skill-list">
                  ${state.skills.map((skill) => `
                    <label class="skill-item">
                      <input type="checkbox" data-skill-toggle="${escapeHtml(skill.slug)}" ${state.enabledSkills.includes(skill.slug) ? "checked" : ""} />
                      <span><b>${escapeHtml(skill.name)}</b><span>${escapeHtml(skill.description || "")}</span></span>
                    </label>
                  `).join("") || `<div class="note">暂无 skill</div>`}
                </div>
              </article>
            </aside>

            <div class="grid">
              <article class="card panel">
                <div class="panel-head"><h3>LLM 配置</h3><button class="primary-btn" type="button" id="saveConfigBtn">保存配置</button></div>
                <div class="form-grid">
                  ${field("Provider", "config-provider", model.provider || "llamacpp")}
                  ${field("Model", "config-model", model.name || "")}
                  ${field("Base URL", "config-base-url", model.base_url || "")}
                  ${field("API Key", "config-api-key", model.api_key || "", "password")}
                  ${field("Max Output Tokens", "config-max-output", model.max_output_tokens || 4096, "number")}
                  ${field("Max Iterations", "config-max-iterations", runtime.max_iterations || 12, "number")}
                  ${field("Context Window Tokens", "config-context", runtime.context_window_tokens || 65536, "number")}
                  ${field("Retry Attempts", "config-retry", runtime.retry_max_attempts || 3, "number")}
                </div>
              </article>

              <article class="card panel">
                <div class="panel-head"><h3>Skill / MCP 配置</h3><span class="note">MCP servers JSON</span></div>
                <div class="form-grid">
                  <label class="skill-item"><input type="checkbox" id="config-skills-enabled" ${skillsCfg.enabled !== false ? "checked" : ""} /><span><b>Skills enabled</b><span>${escapeHtml((skillsCfg.search_paths || ["skills"]).join(", "))}</span></span></label>
                  <label class="skill-item"><input type="checkbox" id="config-mcp-enabled" ${mcp.enabled !== false ? "checked" : ""} /><span><b>MCP enabled</b><span>当前用于配置登记</span></span></label>
                </div>
                <div class="form-row" style="margin-top:12px">
                  <label for="config-mcp-servers">MCP servers</label>
                  <textarea id="config-mcp-servers">${escapeHtml(JSON.stringify(mcp.servers || [], null, 2))}</textarea>
                </div>
              </article>
            </div>
          </section>
        `;
      }

      function field(label, id, value, type = "text") {
        return `<div class="form-row"><label for="${id}">${escapeHtml(label)}</label><input class="field" id="${id}" type="${type}" value="${escapeHtml(value)}" /></div>`;
      }

      function buildAiDashboardDoc(question, answer) {
        const source = String(answer || "");
        const clean = stripCodeBlocks(source);
        const tables = parseMarkdownTables(source);
        const sections = extractAiSections(clean);
        const { actions, risks } = extractAiActionsAndRisks(sections, clean);
        const kpis = extractAiKpis(clean, tables);
        return {
          title: extractAiTitle(clean, question),
          summary: extractAiSummary(clean, sections),
          layout: chooseAiLayout({ source: clean, tables, actions, risks, question }),
          kpis,
          sections,
          tables,
          actions,
          risks,
        };
      }

      function stripCodeBlocks(value) {
        return String(value || "").replace(/```[\s\S]*?```/g, "");
      }

      function extractAiTitle(source, question) {
        const lines = meaningfulLines(source);
        const heading = lines.find((line) => /^(#{1,6})\s+/.test(line));
        if (heading) return cleanAiLabel(heading.replace(/^(#{1,6})\s+/, ""));
        const titled = lines.find((line) => isAiHeadingLine(line));
        if (titled) return cleanAiLabel(splitAiTitleValue(titled)?.title || titled);
        return cleanAiLabel(question || "AI 研判");
      }

      function extractAiSummary(source, sections) {
        const fromSections = (sections || []).find((section) => section.body && section.body.length >= 12)?.body;
        const paragraph = source
          .split(/\n{2,}/)
          .map((block) => compactAiText(block))
          .find((block) => block.length >= 18 && !isTableLikeLine(block) && !/^(#{1,6})\s+/.test(block));
        return truncateText(paragraph || fromSections || "右侧已根据 AI 返回自动拆成指标、表格、执行和风控模块。", 160);
      }

      function parseMarkdownTables(markdown) {
        const lines = stripCodeBlocks(markdown).replace(/\r\n/g, "\n").split("\n");
        const tables = [];
        let lastHeading = "";
        let i = 0;
        while (i < lines.length) {
          const line = lines[i] || "";
          const trimmed = line.trim();
          const heading = trimmed.match(/^(#{1,6})\s+(.+)$/);
          if (heading) {
            lastHeading = cleanAiLabel(heading[2]);
            i += 1;
            continue;
          }
          const looseTitle = isAiHeadingLine(trimmed) ? splitAiTitleValue(trimmed)?.title || trimmed : "";
          if (looseTitle && !trimmed.includes("|") && !trimmed.includes("\t")) lastHeading = cleanAiLabel(looseTitle);

          if (isTableStart(lines, i) || isLoosePipeTableStart(lines, i)) {
            const tableLines = [];
            while (i < lines.length && lines[i].includes("|") && lines[i].trim()) {
              tableLines.push(lines[i]);
              i += 1;
            }
            const rows = tableLines
              .filter((item) => !isMarkdownTableDelimiter(item))
              .map(splitMarkdownTableRow)
              .filter((row) => row.length >= 2 && row.some(Boolean));
            addParsedTable(tables, rows, lastHeading);
            continue;
          }

          if (isTsvTableStart(lines, i)) {
            const tableLines = [];
            while (i < lines.length && /\t/.test(lines[i]) && lines[i].trim()) {
              tableLines.push(lines[i]);
              i += 1;
            }
            const rows = tableLines
              .map((item) => item.split("\t").map((cell) => cell.trim()))
              .filter((row) => row.length >= 2 && row.some(Boolean));
            addParsedTable(tables, rows, lastHeading);
            continue;
          }

          i += 1;
        }
        return tables.slice(0, 6);
      }

      function addParsedTable(tables, rows, title) {
        if (!rows.length) return;
        const headers = rows[0].map((cell, i) => cleanAiLabel(cell) || `列${i + 1}`);
        const body = rows.slice(1)
          .map((row) => headers.map((_, i) => row[i] || ""))
          .filter((row) => row.some((cell) => String(cell).trim()));
        if (!headers.length || !body.length) return;
        tables.push({
          title: title || inferTableTitle(headers, tables.length),
          headers,
          rows: body,
          kind: inferTableKind(headers, title),
        });
      }

      function inferTableTitle(headers, index) {
        const joined = headers.join(" ");
        if (/仓位|策略|执行|预案|买点|触发/.test(joined)) return "执行预案";
        if (/风险|止损|失败|应对/.test(joined)) return "风控清单";
        if (/板块|题材|标的|股票|代码/.test(joined)) return "标的与板块";
        if (/维度|数据|信号|指标/.test(joined)) return "核心指标拆解";
        return `AI 表格 ${index + 1}`;
      }

      function inferTableKind(headers, title = "") {
        const joined = `${title} ${headers.join(" ")}`;
        if (/风险|止损|失败|回撤/.test(joined)) return "Risk";
        if (/仓位|策略|执行|预案|买点|触发/.test(joined)) return "Action";
        if (/板块|题材|标的|股票|代码/.test(joined)) return "Watch";
        return "Data";
      }

      function extractAiSections(source) {
        const lines = source.replace(/\r\n/g, "\n").split("\n");
        const sections = [];
        let current = null;
        const flush = () => {
          if (!current) return;
          const body = compactAiText(current.body.join("\n"));
          if (body) sections.push({ title: cleanAiLabel(current.title), body });
          current = null;
        };

        lines.forEach((raw) => {
          const line = raw.trim();
          if (!line || isTableLikeLine(line) || isMarkdownTableDelimiter(line)) return;
          const heading = line.match(/^(#{1,6})\s+(.+)$/);
          const titleValue = splitAiTitleValue(line);
          if (heading || titleValue || isAiHeadingLine(line)) {
            flush();
            const title = heading ? heading[2] : titleValue?.title || line;
            current = { title, body: [] };
            if (titleValue?.value) current.body.push(titleValue.value);
            return;
          }
          const listItem = stripListPrefix(line);
          if (!current && listItem !== line) {
            sections.push({ title: listTitle(listItem), body: compactAiText(listItem) });
            return;
          }
          if (!current) current = { title: "核心结论", body: [] };
          current.body.push(line);
        });
        flush();

        const deduped = [];
        const seen = new Set();
        sections.forEach((section) => {
          const title = cleanAiLabel(section.title || "结论");
          const body = truncateText(compactAiText(section.body), 260);
          const key = `${title}:${body}`.slice(0, 120);
          if (!body || seen.has(key)) return;
          seen.add(key);
          deduped.push({ title, body });
        });
        return deduped.slice(0, 8);
      }

      function extractAiActionsAndRisks(sections, source) {
        const risks = [];
        const actions = [];
        const add = (target, item) => {
          const title = cleanAiLabel(item.title || listTitle(item.body || ""));
          const body = truncateText(compactAiText(item.body || item.title || ""), 220);
          const key = `${title}:${body}`.slice(0, 120);
          if (!body || target.some((old) => old._key === key)) return;
          target.push({ title, body, _key: key });
        };

        (sections || []).forEach((section) => {
          const combined = `${section.title} ${section.body}`;
          if (isRiskText(combined)) add(risks, section);
          if (isActionText(combined)) add(actions, section);
        });

        meaningfulLines(source).forEach((line) => {
          if (isTableLikeLine(line) || isMarkdownTableDelimiter(line)) return;
          const item = stripListPrefix(line);
          if (isRiskText(item)) add(risks, { title: listTitle(item, "风险"), body: item });
          if (isActionText(item)) add(actions, { title: listTitle(item, "执行"), body: item });
        });

        return {
          actions: actions.slice(0, 6).map(({ _key, ...item }) => item),
          risks: risks.slice(0, 6).map(({ _key, ...item }) => item),
        };
      }

      function extractAiKpis(source, tables) {
        const kpis = [];
        const add = (label, value, note = "", tone = "") => {
          const cleanLabel = cleanAiLabel(label).slice(0, 18);
          const cleanValue = cleanAiLabel(value).slice(0, 18);
          if (!cleanLabel || !cleanValue || kpis.some((item) => item.label === cleanLabel && item.value === cleanValue)) return;
          kpis.push({
            label: cleanLabel,
            value: cleanValue,
            note: truncateText(compactAiText(note), 56),
            tone: tone || toneForText(`${cleanLabel} ${cleanValue} ${note}`),
            badge: /仓位|执行|策略/.test(cleanLabel) ? "Action" : /风险|止损|失败/.test(cleanLabel) ? "Risk" : "AI",
          });
        };

        (tables || []).forEach((table) => {
          table.rows.forEach((row) => {
            const label = row[0] || table.headers[0];
            const valueCell = row.find((cell, index) => index > 0 && isMetricValue(cell));
            if (valueCell) add(label, valueCell, row.slice(1).join(" / "));
          });
        });

        meaningfulLines(source).forEach((line) => {
          if (isTableLikeLine(line)) return;
          const cleaned = stripListPrefix(line);
          const metric = cleaned.match(/([^：:，,。；;\n]{2,18})[：:]\s*([^，,。；;\n]{1,24})/);
          const value = cleaned.match(/([+-]?\d+(?:\.\d+)?\s*(?:%|成|家|亿|分|板|日|个|只)?|[一二三四五六七八九十]+(?:[~\-到至][一二三四五六七八九十]+)?成)/);
          if (metric && isMetricLine(metric[1] + metric[2])) add(metric[1], metric[2], cleaned);
          else if (value && isMetricLine(cleaned)) add(metricLabelFor(cleaned), value[1], cleaned);
        });

        if (!kpis.length && state.dashboard) {
          const k = state.dashboard.kpis || {};
          const o = state.dashboard.overview || {};
          add("情绪指数", fmtLoose(k.sentiment, 1), o.cycle || "当前看板数据", "blue");
          add("周期", o.cycle || "--", o.advice?.steady || "", "orange");
          add("稳健仓位", o.advice?.steady || "--", "来自当前策略看板", "green");
          add("风险项", String((state.dashboard.risks || []).length), "当前风险提示数量", "red");
        }
        return kpis.slice(0, 8);
      }

      function buildChatSupplement(aiDoc) {
        const stats = [
          `${aiDoc.kpis?.length || 0} 个指标`,
          `${aiDoc.tables?.length || 0} 张表`,
          `${aiDoc.actions?.length || 0} 条执行`,
          `${aiDoc.risks?.length || 0} 条风控`,
        ].join(" / ");
        return [
          `已同步到右侧 **${aiDoc.title || "AI 研判"}** 看板。`,
          `左侧只保留补充说明：本次已提取 ${stats}。`,
          aiDoc.summary ? `补充：${aiDoc.summary}` : "",
        ].filter(Boolean).join("\n\n");
      }

      function chooseAiLayout({ source, tables, actions, risks, question }) {
        const text = `${question || ""} ${source || ""}`;
        if ((tables || []).length && /表|清单|矩阵|维度|标的|板块|数据/.test(text)) return "table-led";
        if ((risks || []).length >= Math.max(2, (actions || []).length) || /风险|止损|失败|回撤|防守/.test(text)) return "risk-led";
        if ((actions || []).length || /计划|预案|仓位|执行|买点|触发/.test(text)) return "action-led";
        return "briefing";
      }

      function meaningfulLines(source) {
        return String(source || "")
          .replace(/\r\n/g, "\n")
          .split("\n")
          .map((line) => line.trim())
          .filter(Boolean);
      }

      function splitAiTitleValue(line) {
        const cleaned = stripListPrefix(line).replace(/^(?:[📊📍⚠️✅🔥🚩⭐️▶︎]+|\p{Emoji_Presentation})\s*/u, "").trim();
        const match = cleaned.match(/^(.{2,28}?)[：:]\s*(.{1,220})$/);
        if (!match) return null;
        const title = cleanAiLabel(match[1]);
        if (!/情绪|仓位|策略|建议|风险|机会|板块|标的|结论|计划|预案|维度|信号|应对|执行|提示|要点/.test(title)) return null;
        return { title, value: match[2].trim() };
      }

      function isAiHeadingLine(line) {
        const cleaned = cleanAiLabel(line);
        if (!cleaned || cleaned.length > 34 || isTableLikeLine(line)) return false;
        if (/^(?:[📊📍⚠️✅🔥🚩⭐️▶︎]+|\p{Emoji_Presentation})\s*/u.test(line.trim())) return true;
        if (/情绪|仓位|策略|建议|风险|机会|板块|标的|结论|计划|预案|要点|复盘|清单/.test(cleaned) && !/[。；;,.，]$/.test(cleaned)) return true;
        return false;
      }

      function isRiskText(value) {
        return /风险|止损|失败|回撤|炸板|跌停|退潮|谨慎|防守|⚠/.test(value || "");
      }

      function isActionText(value) {
        return /建议|策略|执行|计划|预案|仓位|买点|触发|观察|参与|应对|清单|检查/.test(value || "");
      }

      function isMetricLine(value) {
        return /仓位|情绪|周期|涨停|跌停|炸板|封板|溢价|成交|强度|风险|评分|温度|比例|家数|指数|资金/.test(value || "");
      }

      function isMetricValue(value) {
        return /[+-]?\d+(?:\.\d+)?\s*(?:%|成|家|亿|分|板|日|个|只)?|[一二三四五六七八九十]+(?:[~\-到至][一二三四五六七八九十]+)?成/.test(value || "");
      }

      function metricLabelFor(line) {
        const keys = ["仓位", "情绪", "周期", "涨停", "跌停", "炸板", "封板率", "溢价", "成交", "强度", "风险", "温度", "指数", "资金"];
        return keys.find((key) => line.includes(key)) || "关键指标";
      }

      function toneForText(value) {
        if (/风险|止损|失败|跌停|退潮/.test(value)) return "red";
        if (/仓位|策略|执行|预案|建议/.test(value)) return "orange";
        if (/机会|转强|修复|稳健|确认/.test(value)) return "green";
        if (/情绪|指数|周期/.test(value)) return "blue";
        return "";
      }

      function cleanAiLabel(value) {
        return String(value || "")
          .replace(/^[#>*\-\s、)）]+/, "")
          .replace(/^(?:[📊📍⚠️✅🔥🚩⭐️▶︎]+|\p{Emoji_Presentation})\s*/u, "")
          .replace(/\*\*|__|~~|`/g, "")
          .trim();
      }

      function compactAiText(value) {
        return String(value || "")
          .split("\n")
          .map((line) => stripListPrefix(line.trim()))
          .filter((line) => line && !isMarkdownTableDelimiter(line) && !isTableLikeLine(line))
          .join(" ")
          .replace(/\s+/g, " ")
          .trim();
      }

      function stripListPrefix(value) {
        return String(value || "").replace(/^\s*(?:[-+*]|\d+[.)、])\s+/, "").trim();
      }

      function listTitle(value, fallback = "要点") {
        const cleaned = cleanAiLabel(value);
        const title = cleaned.split(/[：:，,。；;]/)[0] || fallback;
        return truncateText(title, 18);
      }

      function truncateText(value, max) {
        const textValue = String(value || "").trim();
        return textValue.length > max ? `${textValue.slice(0, max - 1)}...` : textValue;
      }

      function isTableLikeLine(line) {
        if (/\t/.test(line || "")) return true;
        if (!String(line || "").includes("|")) return false;
        return splitMarkdownTableRow(line).length >= 2;
      }

      function markdownToHtml(markdown, options = {}) {
        if (options.inlineOnly) return inlineMd(String(markdown || ""));
        const lines = String(markdown || "").replace(/\r\n/g, "\n").split("\n");
        const out = [];
        let i = 0;
        let inCode = false;
        let code = [];
        let codeLang = "";
        while (i < lines.length) {
          const line = lines[i];
          if (line.trim().startsWith("```")) {
            if (inCode) {
              out.push(`<pre><code${codeLang ? ` class="language-${escapeHtml(codeLang)}"` : ""}>${escapeHtml(code.join("\n"))}</code></pre>`);
              code = [];
              inCode = false;
              codeLang = "";
            } else {
              inCode = true;
              codeLang = line.trim().replace(/^```/, "").trim().split(/\s+/)[0] || "";
            }
            i += 1;
            continue;
          }
          if (inCode) {
            code.push(line);
            i += 1;
            continue;
          }
          if (!line.trim()) {
            i += 1;
            continue;
          }
          if (/^\s*[-*_]{3,}\s*$/.test(line)) {
            out.push("<hr>");
            i += 1;
            continue;
          }
          if (isTableStart(lines, i) || isLoosePipeTableStart(lines, i)) {
            const tableLines = [];
            while (i < lines.length && lines[i].includes("|") && lines[i].trim()) {
              tableLines.push(lines[i]);
              i += 1;
            }
            out.push(renderMarkdownTable(tableLines));
            continue;
          }
          if (isTsvTableStart(lines, i)) {
            const tableLines = [];
            while (i < lines.length && /\t/.test(lines[i]) && lines[i].trim()) {
              tableLines.push(lines[i]);
              i += 1;
            }
            out.push(renderTsvTable(tableLines));
            continue;
          }
          const h = line.match(/^(#{1,6})\s+(.*)$/);
          if (h) {
            out.push(`<h${h[1].length}>${inlineMd(h[2])}</h${h[1].length}>`);
            i += 1;
            continue;
          }
          if (/^>\s?/.test(line)) {
            const parts = [];
            while (i < lines.length && /^>\s?/.test(lines[i])) {
              parts.push(lines[i].replace(/^>\s?/, ""));
              i += 1;
            }
            out.push(`<blockquote>${parts.map(inlineMd).join("<br>")}</blockquote>`);
            continue;
          }
          if (/^\s*[-*]\s+/.test(line)) {
            const items = [];
            while (i < lines.length && /^\s*[-*]\s+/.test(lines[i])) {
              items.push(lines[i].replace(/^\s*[-*]\s+/, ""));
              i += 1;
            }
            out.push(`<ul>${items.map((item) => `<li>${inlineMd(item)}</li>`).join("")}</ul>`);
            continue;
          }
          if (/^\s*\d+\.\s+/.test(line)) {
            const items = [];
            while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
              items.push(lines[i].replace(/^\s*\d+\.\s+/, ""));
              i += 1;
            }
            out.push(`<ol>${items.map((item) => `<li>${inlineMd(item)}</li>`).join("")}</ol>`);
            continue;
          }
          const paragraph = [line];
          i += 1;
          while (i < lines.length && lines[i].trim() && !/^(#{1,6})\s+/.test(lines[i]) && !/^\s*[-*_]{3,}\s*$/.test(lines[i]) && !isTableStart(lines, i) && !isLoosePipeTableStart(lines, i) && !isTsvTableStart(lines, i) && !/^\s*[-*]\s+/.test(lines[i]) && !/^\s*\d+\.\s+/.test(lines[i]) && !/^>\s?/.test(lines[i])) {
            paragraph.push(lines[i]);
            i += 1;
          }
          out.push(`<p>${paragraph.map(inlineMd).join(options.compact ? " " : "<br>")}</p>`);
        }
        if (inCode) out.push(`<pre><code>${escapeHtml(code.join("\n"))}</code></pre>`);
        return out.join("");
      }

      function inlineMd(value) {
        let html = escapeHtml(value);
        html = html.replace(/!\[([^\]]*)\]\((https?:\/\/[^)\s]+|\/[^)\s]+)\)/g, '<img src="$2" alt="$1" loading="lazy" />');
        html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+|\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
        html = html.replace(/&lt;(https?:\/\/[^&\s]+)&gt;/g, '<a href="$1" target="_blank" rel="noreferrer">$1</a>');
        html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
        html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        html = html.replace(/__([^_]+)__/g, "<strong>$1</strong>");
        html = html.replace(/~~([^~]+)~~/g, "<del>$1</del>");
        html = html.replace(/(^|\s)\*([^*]+)\*/g, "$1<em>$2</em>");
        html = html.replace(/(^|\s)_([^_]+)_/g, "$1<em>$2</em>");
        html = html.replace(/^\[x\]\s+/i, '<span class="task-box">✓</span>');
        html = html.replace(/^\[\s\]\s+/i, '<span class="task-box"></span>');
        return html;
      }

      function isTableStart(lines, index) {
        return lines[index]?.includes("|") && isMarkdownTableDelimiter(lines[index + 1] || "");
      }

      function isLoosePipeTableStart(lines, index) {
        const current = lines[index] || "";
        const next = lines[index + 1] || "";
        if (!current.includes("|") || !next.includes("|") || isMarkdownTableDelimiter(next)) return false;
        return splitMarkdownTableRow(current).length >= 2 && splitMarkdownTableRow(next).length >= 2;
      }

      function isMarkdownTableDelimiter(line) {
        return /^\s*\|?[\s:-]+\|[\s|:-]+\s*$/.test(line || "");
      }

      function isTsvTableStart(lines, index) {
        if (!/\t/.test(lines[index] || "")) return false;
        const current = (lines[index] || "").split("\t").filter((cell) => cell.trim()).length;
        const next = (lines[index + 1] || "").split("\t").filter((cell) => cell.trim()).length;
        return current >= 2 && next >= 2;
      }

      function renderMarkdownTable(tableLines) {
        const rows = tableLines
          .filter((line) => !isMarkdownTableDelimiter(line))
          .map(splitMarkdownTableRow);
        if (!rows.length) return "";
        const [head, ...body] = rows;
        return `<table class="md-table"><thead><tr>${head.map((c) => `<th>${inlineMd(c)}</th>`).join("")}</tr></thead><tbody>${body.map((row) => `<tr>${head.map((_, i) => `<td>${inlineMd(row[i] || "")}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
      }

      function splitMarkdownTableRow(line) {
        const cells = [];
        let cur = "";
        let escaped = false;
        const value = line.trim().replace(/^\|/, "").replace(/\|$/, "");
        for (const ch of value) {
          if (escaped) {
            cur += ch;
            escaped = false;
          } else if (ch === "\\") {
            escaped = true;
          } else if (ch === "|") {
            cells.push(cur.trim());
            cur = "";
          } else {
            cur += ch;
          }
        }
        cells.push(cur.trim());
        return cells;
      }

      function renderTsvTable(tableLines) {
        const rows = tableLines.map((line) => line.split("\t").map((cell) => cell.trim()));
        if (!rows.length) return "";
        const [head, ...body] = rows;
        return `<table class="md-table"><thead><tr>${head.map((c) => `<th>${inlineMd(c)}</th>`).join("")}</tr></thead><tbody>${body.map((row) => `<tr>${head.map((_, i) => `<td>${inlineMd(row[i] || "")}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
      }

      async function sendPrompt(prompt) {
        const content = String(prompt || "").trim();
        if (!content || state.loadingChat) return;
        state.messages.push({ role: "user", content });
        state.loadingChat = true;
        renderMessages();
        byId("chatInput").value = "";
        try {
          const chatMessages = state.messages
            .filter((m) => m.role === "user" || m.role === "assistant")
            .slice(-10)
            .map((m) => ({ role: m.role, content: m.fullContent || m.content }));
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              messages: chatMessages,
              stream: false,
              skills: activePromptSkills(),
            }),
          });
          const data = await res.json();
          const answer = data.content || JSON.stringify(data, null, 2);
          const aiDoc = buildAiDashboardDoc(content, answer);
          state.aiDoc = aiDoc;
          state.messages.push({
            role: "assistant",
            content: buildChatSupplement(aiDoc),
            fullContent: answer,
          });
          state.assistantPanel = {
            question: content,
            answer,
            time: new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", second: "2-digit" }),
          };
          state.activeView = "ai";
          render();
        } catch (err) {
          const answer = `请求失败：${err.message || err}`;
          state.messages.push({ role: "assistant", content: answer });
          renderMessages();
        } finally {
          state.loadingChat = false;
          render();
        }
      }

      function handleIntent(id) {
        const item = state.intents.get(id);
        if (!item) return;
        state.focus = item;
        if (item.widgetRef) {
          sendInteraction(item.widgetRef, "drilldown", item.payload || {});
        }
        toast(`已聚焦：${item.title}`);
        render();
      }

      async function saveConfigFromForm() {
        const cfg = structuredClone(state.config || {});
        cfg.model = {
          ...(cfg.model || {}),
          provider: byId("config-provider").value.trim(),
          name: byId("config-model").value.trim(),
          base_url: byId("config-base-url").value.trim(),
          api_key: byId("config-api-key").value,
          max_output_tokens: Number(byId("config-max-output").value || 4096),
        };
        cfg.runtime = {
          ...(cfg.runtime || {}),
          max_iterations: Number(byId("config-max-iterations").value || 12),
          retry_max_attempts: Number(byId("config-retry").value || 3),
          context_window_tokens: Number(byId("config-context").value || 65536),
        };
        cfg.skills = {
          ...(cfg.skills || {}),
          enabled: byId("config-skills-enabled").checked,
          search_paths: (cfg.skills?.search_paths || ["skills"]),
        };
        try {
          cfg.mcp = {
            ...(cfg.mcp || {}),
            enabled: byId("config-mcp-enabled").checked,
            servers: JSON.parse(byId("config-mcp-servers").value || "[]"),
          };
        } catch {
          toast("MCP servers JSON 格式错误");
          return;
        }
        const res = await fetch("/api/config", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ config: cfg }),
        });
        if (!res.ok) {
          toast(`保存失败：${res.status}`);
          return;
        }
        state.config = (await res.json()).config;
        toast("配置已保存");
        render();
      }

      function bindEvents() {
        byId("chatForm").addEventListener("submit", (event) => {
          event.preventDefault();
          sendPrompt(byId("chatInput").value);
        });
        byId("refreshBtn").addEventListener("click", loadDashboard);
        document.body.addEventListener("click", async (event) => {
          const target = event.target.closest("button, [data-intent-id], input[type='checkbox']");
          if (!target) return;
          if (target.dataset.view) {
            state.activeView = target.dataset.view;
            if (state.activeView === "settings" && !state.config) await loadSettings();
            render();
            return;
          }
          if (target.dataset.prompt) {
            sendPrompt(target.dataset.prompt);
            return;
          }
          if (target.dataset.intentId) {
            handleIntent(target.dataset.intentId);
            return;
          }
          if (target.dataset.themeChoice) {
            applyTheme(target.dataset.themeChoice);
            render();
            return;
          }
          if (target.dataset.skillToggle) {
            const slug = target.dataset.skillToggle;
            const set = new Set(state.enabledSkills);
            target.checked ? set.add(slug) : set.delete(slug);
            state.enabledSkills = Array.from(set);
            saveJson("sentiment-enabled-skills", state.enabledSkills);
            renderChrome();
            return;
          }
          if (target.id === "saveConfigBtn") {
            saveConfigFromForm();
          }
        });
      }

      async function init() {
        applyTheme();
        bindEvents();
        connectWs();
        await Promise.all([loadDashboard(), loadSettings()]);
        render();
      }

      init();
    </script>
  </body>
</html>
